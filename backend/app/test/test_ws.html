<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: monospace;
            background: #111;
            color: #0f0;
            padding: 20px;
        }

        #status {
            font-size: 18px;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 16px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        pre {
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div id="status">Connecting…</div>
    <button onclick="analyse()">Analyse Now</button>
    <pre id="log"></pre>
    <script>
        const statusEl = document.getElementById("status");
        const logEl = document.getElementById("log");
        let lastThreadId = null;

        function log(msg) {
            logEl.textContent = msg + "\n" + logEl.textContent;
        }

        const ws = new WebSocket("ws://127.0.0.1:8000/ws/telemetry");

        ws.onopen = () => { statusEl.textContent = "✅ Connected to backend"; };
        ws.onerror = () => { statusEl.textContent = "❌ Connection ERROR — is the backend running on port 8000?"; };
        ws.onclose = () => { statusEl.textContent = "🔌 Connection closed"; };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === "telemetry") {
                log("TELEMETRY pressure=" + msg.data.hospital_pressure);
            } else if (msg.type === "analysis_started") {
                log(">>> ANALYSIS STARTED (" + msg.reason + ")");
            } else if (msg.type === "analysis_result") {
                lastThreadId = msg.data.thread_id;
                log("ANALYSIS RESULT: risk=" + msg.data.risk_level +
                    " awaiting=" + msg.data.awaiting_approval +
                    " committed=" + msg.data.committed);
                if (msg.data.awaiting_approval) {
                    if (confirm("Approve the plan?")) {
                        ws.send(JSON.stringify({ action: "approve", thread_id: lastThreadId }));
                    }
                }
            }
        };

        function analyse() { ws.send(JSON.stringify({ action: "analyse" })); }
    </script>
</body>

</html>
